behaviors:
  LidarBehavior:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048          # Increased from 128/256 to stabilize learning across 10 envs
      buffer_size: 20480        # Holds more experiences before updating
      learning_rate: 3.0e-4
      beta: 5.0e-3              # Increased entropy slightly to FORCE exploration (stops it from sitting still)
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true           # Normalizes incoming sensors automatically
      hidden_units: 512         # Doubled layer capacity!
      num_layers: 3             # Added a whole extra layer for deeper feature mapping!
      vis_encode_type: simple
      memory:
        sequence_length: 64
        memory_size: 128
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 5000000
    time_horizon: 128
    summary_freq: 10000