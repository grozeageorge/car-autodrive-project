behaviors:
  LidarBehavior:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048          # Increased: Smoothes out erratic learning updates
      buffer_size: 20480        # Increased: Collects more data before shifting the car's behavior
      learning_rate: 0.0003
      beta: 0.0005              # DRASTICALLY LOWERED: Kills the random twitching. Forces the AI to commit to a steering angle.
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256         # Increased: Gives the brain more "neurons" to process your 360-degree Lidar
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.995            # Increased: Forces the AI to look further into the future (helps it accelerate toward distant checkpoints)
        strength: 1.0
    max_steps: 5000000
    time_horizon: 128           # Increased: Looks 128 physics steps ahead to anticipate corners
    summary_freq: 10000